<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>미카는 미카 │ SOOP 버츄얼 </title>
  <style>
    /* ---------------------------------------------------
       [기본 설정] 
    --------------------------------------------------- */
    body { margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    a { text-decoration: none; }
    
    /* ---------------------------------------------------
       1. 메인 네비게이션 바 (상단 고정)
    --------------------------------------------------- */
    .main-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 30px; background-color: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid #ecfdf5; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
      position: sticky; top: 0; z-index: 50;
    }
    .nav-left { display: flex; align-items: center; gap: 15px; font-weight: 900; color: #0f172a; }
    .nav-right { display: flex; gap: 10px; }

    .top-btn {
      background-color: #FFFFFF; color: #334155; font-size: 14px; font-weight: 700;
      padding: 8px 16px; border: 1px solid #cbd5e1; border-radius: 16px; cursor: pointer;
      transition: all 0.2s;
    }
    
    /* 선택된 버튼(활성화) 디자인 (초록색) */
    .top-btn.active {
      background-color: #059669; color: #ffffff; border-color: #059669;
    }

    /* ---------------------------------------------------
       2. 서브 네비게이션 바
    --------------------------------------------------- */
    .sub-nav {
      display: flex; gap: 20px; padding: 15px 30px;
      background-color: #ffffff; border-bottom: 1px solid #e2e8f0;
    }
    .sub-btn {
      background: none; border: none; font-size: 14px; font-weight: 600;
      color: #64748b; cursor: pointer; padding: 5px 0;
    }
    .sub-btn.active { color: #059669; border-bottom: 2px solid #059669; }

    /* ---------------------------------------------------
       3. 메인 콘텐츠 (배너 영역)
    --------------------------------------------------- */
    .container { max-width: 1200px; margin: 0 auto; padding: 30px; }

    .hero-section {
      display: flex; background-color: #ffffff; border-radius: 24px;
      overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 40px;
    }
    /* 메인 배너 이미지 영역 (506*380 느낌 유지) */
    .hero-img { width: 50%; background-color: #1e293b; }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; }
    
    .hero-text { width: 50%; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
    .badge { display: inline-block; background-color: #d1fae5; color: #047857; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; width: fit-content; margin-bottom: 10px; }
    .hero-text h1 { margin: 0 0 5px 0; font-size: 28px; color: #0f172a; }
    .hero-text h3 { margin: 0 0 20px 0; font-size: 14px; color: #059669; font-weight: normal; }
    .hero-text p { color: #475569; font-size: 15px; line-height: 1.6; }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-header h2 { margin: 0; font-size: 20px; color: #0f172a; }
    .member-count-box { font-size: 14px; color: #6366f1; font-weight: bold; }

    /* ---------------------------------------------------
       ★ 4. 리스트 (와이어프레임 & 400*400 비율 적용)
    --------------------------------------------------- */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 큼직하게 3칸으로 나눔 */
      gap: 30px; /* 카드 사이 간격 */
    }

    .member-card {
      background-color: #ffffff; 
      border-radius: 16px; 
      padding: 20px;
      display: flex; 
      flex-direction: column; 
      align-items: center;    
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
      transition: transform 0.2s;
      height: 100%; /* 카드 높이 균일하게 맞춤 */
    }
    .member-card:hover { transform: translateY(-5px); }
    
    /* 제안해주신 400*400 (1:1 비율) 마법 코드 */
    .member-card img { 
      width: 100%; /* 너비는 그리드에 꽉 차게 */
      aspect-ratio: 1 / 1; /* ★ 가로세로 비율을 1:1 정사각형으로 강제 고정! */
      border-radius: 12px; 
      object-fit: cover; 
      margin-bottom: 20px; 
      background-color: #f1f5f9; 
    }

    .member-card h4 { 
      margin: 0 0 15px 0; 
      font-size: 18px; 
      color: #0f172a; 
      text-align: center;
    }

    /* 링크 보기 버튼 */
    .member-btn {
      background-color: #f0fdf4; 
      color: #16a34a; 
      border: 1px solid #bbf7d0;
      padding: 10px 24px; 
      border-radius: 20px; 
      font-size: 14px; 
      font-weight: bold; 
      text-decoration: none; 
      display: inline-block; /* a 태그를 예쁜 버튼 모양으로 만듦 */
      margin-top: auto; /* ★ 글자 길이가 달라도 버튼을 카드 맨 밑으로 밀어냄 */
      transition: background-color 0.2s;
    }
    .member-btn:hover { background-color: #dcfce7; }
  </style>
</head>
<body>

  <!-- 1. 메인 상단 네비게이션 -->
  <nav class="main-nav">
    <div class="nav-left">
      <span>🧚 미카는 미카</span>
    </div>
    <div class="nav-right">
      <button class="top-btn active" onclick="activateMenu(this)">SOOP</button>
      <button class="top-btn" onclick="activateMenu(this)">유튜브</button>
      <button class="top-btn" onclick="activateMenu(this)">우미단</button>
    </div>
  </nav>

  <!-- 2. 서브 메뉴바 -->
  <div class="sub-nav">
    <button class="sub-btn active">💬공지</button>
    <button class="sub-btn">❤️추천 게시판</button>
    <button class="sub-btn">👀미카, 이거봤어?</button>
    <button class="sub-btn">📷사진첩</button>
  </div>

  <!-- 3. 메인 콘텐츠 -->
  <div class="container">
    
    <!-- 동아리 설명 배너 -->
    <section class="hero-section">
      <div class="hero-img">
        <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="게임배너">
      </div>
      <div class="hero-text">
        <span class="badge">SOOP 버츄얼</span>
        <h1>미카는 미카</h1>
        <h3>CONTACT: dearmika34@naver.com</h3>
        <p>안녕하세요~ 와튜버로 데뷔한 미카입니다. 데뷔일은 26년 3월 6일입니다!</p>
      </div>
    </section>

    <!-- 리스트 영역 -->
    <section class="members-section">
      <div class="section-header">
        <h2>게시판</h2>
        <!-- 자바스크립트로 자동 계산되는 숫자 -->
        <div class="member-count-box"><span id="dynamic-count">0</span>개</div>
      </div>
      
      <!-- 카드들을 담는 3단 그리드 -->
      <div class="members-grid" id="member-list">
        
        <!-- 카드 1 -->
        <article class="member-card">
          <!-- 깃허브에 올리신 이미지 이름을 넣어주세요 -->
          <img src="notice.png" alt="방송 공지 이미지">
          <h4>방송 공지</h4>
          <a href="https://www.sooplive.com/station/mika35/board/122664957" target="_blank" class="member-btn">공지 보기</a>
        </article>

        <!-- 카드 2 -->
        <article class="member-card">
          <img src="up.png" alt="UP 게시판">
          <h4>UP 게시판</h4>
          <a href="https://www.sooplive.com/station/mika35/board/123417053" target="_blank" class="member-btn">UP 누르기</a>
        </article>
        
        <!-- 카드 3 -->
        <article class="member-card">
          <img src="mikasay.png" alt="미카 게시판">
          <h4>미카 게시판</h4>
          <a href="https://www.sooplive.com/station/mika35/board/122859561" target="_blank" class="member-btn">구경하기</a>
        </article>
        
      </div>
    </section>
  </div>

  <!-- 자바스크립트 영역 -->
  <script>
    function updateMemberCount() {
      const cards = document.querySelectorAll('.member-card');
      document.getElementById('dynamic-count').innerText = cards.length;
    }
    updateMemberCount();

    function activateMenu(clickedButton) {
      const buttons = document.querySelectorAll('.top-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      clickedButton.classList.add('active');
    }
  </script>
</body>
</html>
