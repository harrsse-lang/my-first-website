<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>우왁굳의 동아리 - 신스멀게동</title>
  <style>
    /* ---------------------------------------------------
       [기본 설정] 
    --------------------------------------------------- */
    body { margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    a { text-decoration: none; }
    
    /* ---------------------------------------------------
       1. 메인 네비게이션 바
    --------------------------------------------------- */
    .main-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 30px; background-color: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid #ecfdf5; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
      position: sticky; top: 0; z-index: 50;
    }
    .nav-left { display: flex; align-items: center; gap: 15px; font-weight: 900; color: #0f172a; }
    .nav-right { display: flex; gap: 10px; }

    /* 상단 버튼 기본 디자인 */
    .top-btn {
      background-color: #FFFFFF; color: #334155; font-size: 14px; font-weight: 700;
      padding: 8px 16px; border: 1px solid #cbd5e1; border-radius: 16px; cursor: pointer;
      transition: all 0.2s;
    }
    
    /* ★ 선택된 버튼(활성화) 디자인 (초록색) */
    .top-btn.active {
      background-color: #059669; /* 진한 초록색 */
      color: #ffffff;
      border-color: #059669;
    }

    /* ---------------------------------------------------
       2. 서브 네비게이션 바 (멤버, 일정 등)
    --------------------------------------------------- */
    .sub-nav {
      display: flex; gap: 20px; padding: 15px 30px;
      background-color: #ffffff; border-bottom: 1px solid #e2e8f0;
    }
    .sub-btn {
      background: none; border: none; font-size: 14px; font-weight: 600;
      color: #64748b; cursor: pointer; padding: 5px 0;
    }
    .sub-btn.active { color: #059669; border-bottom: 2px solid #059669; } /* 선택된 서브메뉴 */

    /* ---------------------------------------------------
       3. 메인 콘텐츠 구역 (배너 + 멤버 리스트)
    --------------------------------------------------- */
    .container { max-width: 1200px; margin: 0 auto; padding: 30px; }

    /* 동아리 설명 배너 영역 */
    .hero-section {
      display: flex; background-color: #ffffff; border-radius: 24px;
      overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 40px;
    }
    .hero-img { width: 50%; background-color: #1e293b; }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; }
    .hero-text { width: 50%; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
    
    .badge { display: inline-block; background-color: #d1fae5; color: #047857; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; width: fit-content; margin-bottom: 10px; }
    .hero-text h1 { margin: 0 0 5px 0; font-size: 28px; color: #0f172a; }
    .hero-text h3 { margin: 0 0 20px 0; font-size: 14px; color: #059669; font-weight: normal; }
    .hero-text p { color: #475569; font-size: 15px; line-height: 1.6; }

    /* 멤버 타이틀 영역 (멤버 글자와 13명 숫자가 있는 곳) */
    .section-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
    }
    .section-header h2 { margin: 0; font-size: 20px; color: #0f172a; }
    .member-count-box { font-size: 14px; color: #6366f1; font-weight: bold; }

    /* ---------------------------------------------------
       4. 멤버 리스트 (CSS Grid 활용 - 5칸씩 자동 배치)
    --------------------------------------------------- */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr); /* 한 줄에 5명씩 배치 */
      gap: 20px;
    }

    .member-card {
      background-color: #ffffff; border-radius: 16px; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.2s;
    }
    .member-card:hover { transform: translateY(-5px); } /* 마우스 올리면 살짝 떠오름 */
    
    .member-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; background-color: #f1f5f9; }
    .member-card h4 { margin: 0 0 15px 0; font-size: 16px; color: #0f172a; }
    .member-btn {
      background-color: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0;
      padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- 1. 메인 상단 네비게이션 -->
  <nav class="main-nav">
    <div class="nav-left">
      <span>🏠 우왁굳의 동아리</span>
    </div>
    <div class="nav-right">
      <!-- 'active' 클래스가 붙으면 초록색으로 보입니다 -->
      <button class="top-btn active" onclick="activateMenu(this)">신스멀게동</button>
      <button class="top-btn" onclick="activateMenu(this)">브품동</button>
      <button class="top-btn" onclick="activateMenu(this)">하맵동</button>
    </div>
  </nav>

  <!-- 2. 서브 메뉴바 -->
  <div class="sub-nav">
    <button class="sub-btn active">멤버</button>
    <button class="sub-btn">일정</button>
    <button class="sub-btn">게임 입찰</button>
    <button class="sub-btn">갤슬랭</button>
  </div>

  <!-- 3. 메인 콘텐츠 -->
  <div class="container">
    
    <!-- 동아리 설명 배너 -->
    <section class="hero-section">
      <div class="hero-img">
        <!-- 스팀 이미지 주소를 이곳에 넣으시면 됩니다 -->
        <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="게임배너">
      </div>
      <div class="hero-text">
        <span class="badge">신스멀게동</span>
        <h1>신스멀게동</h1>
        <h3>신작스팀멀티게임 동아리</h3>
        <p>우왁굳과 멤버들이 새로 나온 스팀 멀티게임을 함께 고르고 플레이하는 동아리입니다.</p>
      </div>
    </section>

    <!-- 멤버 리스트 영역 -->
    <section class="members-section">
      <div class="section-header">
        <h2>멤버</h2>
        <!-- ★ 이 숫자가 자바스크립트에 의해 자동으로 바뀝니다! -->
        <div class="member-count-box"><span id="dynamic-count">0</span>명</div>
      </div>
      
      <!-- 멤버 카드들을 담는 큰 상자 -->
      <div class="members-grid" id="member-list">
        
        <!-- 멤버 1 -->
        <article class="member-card">
          <img src="profile1.png" alt="우왁굳">
          <h4>우왁굳</h4>
          <button class="member-btn">방송국 가기</button>
        </article>

        <!-- 멤버 2 -->
        <article class="member-card">
          <img src="profile2.png" alt="마이곰이">
          <h4>마이곰이</h4>
          <button class="member-btn">방송국 가기</button>
        </article>
        
        <!-- 멤버 3 -->
        <article class="member-card">
          <img src="profile3.png" alt="유키라">
          <h4>유키라</h4>
          <button class="member-btn">방송국 가기</button>
        </article>

        <!-- 임시로 1명을 더 추가해보겠습니다 -->
        <article class="member-card">
          <img src="profile4.png" alt="천양">
          <h4>천양</h4>
          <button class="member-btn">방송국 가기</button>
        </article>

        <!-- 
          새로운 멤버를 추가하고 싶다면 
          여기서부터 <article> ~ </article> 까지를 복사해서 밑에 계속 붙여넣기만 하세요! 
          JS가 알아서 숫자를 세어줍니다. 
        -->
        
      </div>
    </section>
  </div>

  <!-- ★ 4. 마법의 자바스크립트 공간 -->
  <script>
    // 1. 멤버 숫자를 자동으로 세어주는 기능
    function updateMemberCount() {
      // HTML 문서 안에서 'member-card'라는 이름표를 가진 녀석들을 모두 찾아서 모아옵니다.
      const cards = document.querySelectorAll('.member-card');
      
      // 모아온 카드의 개수(length)를 센 다음, 'dynamic-count'라는 곳에 글자로 적어줍니다.
      document.getElementById('dynamic-count').innerText = cards.length;
    }

    // 웹페이지가 처음 켜지면 바로 숫자를 세도록 명령합니다.
    updateMemberCount();

    // 2. 상단 버튼 클릭 시 초록색으로 활성화되는 기능
    function activateMenu(clickedButton) {
      // 먼저 모든 상단 버튼에서 'active(초록색)' 디자인을 뺏어옵니다.
      const buttons = document.querySelectorAll('.top-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      
      // 방금 내가 클릭한 그 버튼에만 'active' 디자인을 줍니다.
      clickedButton.classList.add('active');
    }
  </script>
</body>
</html>
