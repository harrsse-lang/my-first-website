<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- 1. 타이틀 닫는 태그(<) 수정 완료 -->
  <title>미카는 미카</title>
  <style>
    html { scroll-behavior: smooth; }
    section { height: 100vh; padding: 50px; }
    #home { background-color: #f0f8ff; } 
    #vr { background-color: #e6e6fa; }   
    
    nav a {
      font-size: 14px;                 
      color: #020617;                  
      font-weight: 900;                
      font-family: 'Inter', sans-serif; 
      text-decoration: none;           
    }  
    
    nav {
      display: flex;          
      align-items: center;    
      gap: 15px; /* (참고) 글자와 간격을 위해 15px로 띄워두었습니다 */
    }
    
    .top-btn {
      background-color: #FFFFFF; 
      color: #334155; 
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 900; 
      padding: 8px 16px; 
      border: 1px solid #cbd5e1; 
      border-radius: 16px; 
      white-space: nowrap; 
      cursor: pointer; 
    }
  </style>
</head>
<body>
  <!-- 3. 네비게이션 영역을 올바르게 묶음 -->
  <nav>
    <a href="#home">
      <img src="homebutton.png" alt="홈으로 이동" width="50">
    </a> <!-- 2. 이미지 링크 닫는 태그(</a>) 추가 완료 -->
    
    <a href="#vr">미카는 미카</a>
    <button class="top-btn">컨텐츠 UP❤️</button>
  </nav> <!-- 닫는 태그 빗금(/) 정상 적용 완료 -->

  <!-- 첫 번째 구역 (홈) -->
  <section id="home">
    <h1>여기는 첫 화면입니다.</h1>
    <p>위의 'VR 섹션으로 이동' 글자를 클릭해 보세요.</p>
  </section>

  <!-- 두 번째 구역 (VR) -->
  <section id="vr">
    <h1>여기가 바로 VR 섹션입니다!</h1>
    <p>주소창을 보시면 끝에 #vr이 붙어있는 것을 확인할 수 있습니다.</p>
    <p>참고하신 사이트와 똑같은 원리로 작동하는 거랍니다.</p>
  </section>
</body>
</html>
